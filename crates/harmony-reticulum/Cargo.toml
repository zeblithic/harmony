[package]
name = "harmony-reticulum"
description = "Reticulum packet format and announce mechanism for the Harmony network"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
harmony-crypto = { workspace = true }
harmony-identity = { workspace = true }
ed25519-dalek = { workspace = true }
x25519-dalek = { workspace = true }
rand_core = { workspace = true }
zeroize = { workspace = true }
thiserror = { workspace = true }
rmp = { workspace = true }
hashbrown = { workspace = true }

[features]
default = ["std"]
no-neon = ["harmony-crypto/no-neon"]
std = [
    "harmony-crypto/std",
    "harmony-identity/std",
    "rand_core/getrandom",
    "ed25519-dalek/std",
    "thiserror/std",
    "rmp/std",
    "hashbrown/default-hasher",
]

[dev-dependencies]
rand = { workspace = true }
hex = { workspace = true }
