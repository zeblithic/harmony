[package]
name = "harmony-rawlink"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
default = ["std"]
std = []
rawlink-integration = []

[dependencies]
hex.workspace = true
libc = { workspace = true }
