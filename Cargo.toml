[workspace]
resolver = "2"
members = [
    "crates/harmony-compute",
    "crates/harmony-content",
    "crates/harmony-crypto",
    "crates/harmony-identity",
    "crates/harmony-node",
    "crates/harmony-reticulum",
    "crates/harmony-workflow",
    "crates/harmony-zenoh",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/zeblithic/harmony"
rust-version = "1.75"

[workspace.dependencies]
# Cryptographic primitives
sha2 = "0.10"
blake3 = "1"
hkdf = "0.12"
hmac = "0.12"
aes = "0.8"
cbc = { version = "0.1", features = ["alloc"] }
chacha20poly1305 = "0.10"

# Elliptic curve cryptography
ed25519-dalek = { version = "2", features = ["rand_core"] }
x25519-dalek = { version = "2", features = ["static_secrets"] }

# Utilities
rand = "0.8"
rand_core = { version = "0.6", features = ["getrandom"] }
zeroize = { version = "1", features = ["derive"] }
subtle = "2"
thiserror = "2"
rmp = "0.8"
hex = "0.4"

# WASM runtime
wasmi = "1"
wasmtime = "38"

# Internal crates
harmony-compute = { path = "crates/harmony-compute" }
harmony-content = { path = "crates/harmony-content" }
harmony-crypto = { path = "crates/harmony-crypto" }
harmony-identity = { path = "crates/harmony-identity" }
harmony-reticulum = { path = "crates/harmony-reticulum" }
harmony-workflow = { path = "crates/harmony-workflow" }
harmony-zenoh = { path = "crates/harmony-zenoh" }
